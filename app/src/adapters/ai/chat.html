<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat · Dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: #f7f8fa;
      color: #1a1a2e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶栏 ── */
    header {
      padding: 0 20px;
      height: 48px;
      border-bottom: 1px solid #e4e7ed;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header .logo { font-size: 18px; }
    header strong { font-size: 15px; color: #1a1a2e; }
    header .api-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #909399;
    }
    header .api-wrap input {
      background: #f4f5f7;
      border: 1px solid #dcdfe6;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      color: #606266;
      outline: none;
      width: 180px;
    }
    header .api-wrap input:focus { border-color: #4f6ef7; }
    header .api-wrap input.model-input { width: 140px; }
    .think-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid #dcdfe6;
      background: #f4f5f7;
      color: #606266;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, border-color .15s, color .15s;
      user-select: none;
    }
    .think-btn:hover { background: #eef0f6; }
    .think-btn.active {
      background: #f3efff;
      border-color: #b39ddb;
      color: #7c4dff;
    }
    .effort-select {
      background: #f4f5f7;
      border: 1px solid #b39ddb;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 12px;
      color: #7c4dff;
      outline: none;
      cursor: pointer;
    }
    #status-label { font-size: 11px; color: #c0c4cc; margin-left: 8px; }

    /* ── 消息区 ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .msg-row {
      display: flex;
      padding: 6px 24px;
      gap: 12px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-top: 2px;
    }
    .avatar.user { background: #4f6ef7; color: #fff; font-size: 13px; font-weight: 600; }
    .avatar.ai   { background: #e8f0fe; }

    .msg-body { flex: 1; min-width: 0; }
    .msg-name { font-size: 12px; color: #909399; margin-bottom: 4px; }

    /* 用户气泡 */
    .user-bubble {
      display: inline-block;
      background: #4f6ef7;
      color: #fff;
      border-radius: 12px 12px 4px 12px;
      padding: 9px 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 540px;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

    /* ── 思考步骤块 ── */
    .think-block {
      border: 1px solid #e4e7ed;
      border-radius: 8px;
      background: #fff;
      margin-bottom: 8px;
      overflow: hidden;
      font-size: 13px;
    }
    .think-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      cursor: pointer;
      user-select: none;
      color: #606266;
      font-size: 12px;
      background: #fafafa;
      border-bottom: 1px solid transparent;
      transition: background .15s;
    }
    .think-toggle:hover { background: #f0f2f5; }
    .think-toggle.open { border-bottom-color: #e4e7ed; }
    .think-toggle .think-icon { font-size: 13px; }
    .think-toggle .chevron {
      margin-left: auto;
      font-size: 10px;
      transition: transform .2s;
      color: #c0c4cc;
    }
    .think-toggle.open .chevron { transform: rotate(180deg); }
    .think-steps { display: none; padding: 4px 0; }
    .think-steps.visible { display: block; }

    /* 单条步骤 */
    .step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid #f0f2f5;
      font-size: 12px;
    }
    .step:last-child { border-bottom: none; }
    .step-icon { flex-shrink: 0; margin-top: 1px; }
    .step-content { flex: 1; min-width: 0; }
    .step-title {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #303133;
      font-weight: 500;
    }
    .step-badge {
      background: #f0f2f5;
      color: #606266;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .step-status {
      margin-left: auto;
      flex-shrink: 0;
    }
    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid #dcdfe6;
      border-top-color: #4f6ef7;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-result {
      margin-top: 4px;
      color: #909399;
      font-size: 11px;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      background: #f7f8fa;
      border-radius: 4px;
      padding: 4px 8px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 80px;
      overflow: hidden;
      position: relative;
    }
    .step-result.expandable { cursor: pointer; }
    .step-result.expandable::after {
      content: "展开 ▾";
      position: absolute;
      bottom: 0; right: 0;
      padding: 2px 6px;
      background: linear-gradient(to right, transparent, #f7f8fa 40%);
      color: #4f6ef7;
      font-size: 10px;
    }
    .step-result.expanded { max-height: none; }
    .step-result.expanded::after { display: none; }

    /* ── 模型思考块 ── */
    .model-think-block {
      border: 1px solid #e5dff5;
      border-radius: 8px;
      background: #faf8ff;
      margin-bottom: 8px;
      overflow: hidden;
      font-size: 13px;
    }
    .model-think-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      cursor: pointer;
      user-select: none;
      color: #7c4dff;
      font-size: 12px;
      background: #f3efff;
      border-bottom: 1px solid transparent;
      transition: background .15s;
    }
    .model-think-toggle:hover { background: #ede8ff; }
    .model-think-toggle.open { border-bottom-color: #e5dff5; }
    .model-think-toggle .mt-chevron {
      margin-left: auto;
      font-size: 10px;
      transition: transform .2s;
      color: #b39ddb;
    }
    .model-think-toggle.open .mt-chevron { transform: rotate(180deg); }
    .model-think-content {
      display: none;
      padding: 10px 14px;
      color: #6b5b95;
      font-style: italic;
      font-size: 12.5px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 260px;
      overflow-y: auto;
    }
    .model-think-content.visible { display: block; }

    /* AI 回复文本 */
    .ai-text {
      font-size: 14px;
      line-height: 1.75;
      color: #303133;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ai-text.streaming::after {
      content: "▍";
      animation: blink .8s step-end infinite;
      color: #4f6ef7;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .error-text { color: #f56c6c; font-size: 13px; }

    .empty-hint {
      text-align: center;
      color: #c0c4cc;
      font-size: 14px;
      padding: 60px 0;
    }

    /* ── 输入区 ── */
    #input-area {
      padding: 12px 24px 16px;
      background: #fff;
      border-top: 1px solid #e4e7ed;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }
    /* full-width wrapper */
    #input-outer {
      background: #fff;
      border-top: 1px solid #e4e7ed;
      flex-shrink: 0;
    }

    #prompt {
      flex: 1;
      background: #f7f8fa;
      border: 1px solid #dcdfe6;
      border-radius: 10px;
      padding: 10px 14px;
      color: #303133;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color .2s;
    }
    #prompt:focus { border-color: #4f6ef7; background: #fff; }
    #prompt::placeholder { color: #c0c4cc; }

    #send-btn {
      background: #4f6ef7;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, opacity .15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #3b5bdb; }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── 图片预览 ── */
    #img-preview-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 24px 0;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }
    #img-preview-bar:empty { display: none; }
    .img-thumb {
      position: relative;
      width: 60px; height: 60px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #dcdfe6;
      flex-shrink: 0;
    }
    .img-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .img-thumb .remove-btn {
      position: absolute;
      top: 2px; right: 2px;
      width: 16px; height: 16px;
      background: rgba(0,0,0,.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 10px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      padding: 0;
    }
    #upload-btn {
      background: #f7f8fa;
      border: 1px solid #dcdfe6;
      border-radius: 8px;
      padding: 0 12px;
      height: 44px;
      cursor: pointer;
      font-size: 18px;
      color: #909399;
      transition: background .15s;
      flex-shrink: 0;
    }
    #upload-btn:hover { background: #eef0f6; }
    /* 用户消息图片 */
    .msg-images {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
      justify-content: flex-end;
    }
    .msg-images img {
      max-width: 200px;
      max-height: 160px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #c6cff5;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🤖</span>
  <strong>AI Chat</strong>
  <div class="api-wrap">
    <span>API</span>
    <input id="api-base" value="http://localhost:8080" />
    <span style="color:#dcdfe6">|</span>
    <span>模型</span>
    <input id="model-input" class="model-input" placeholder="默认模型" title="留空使用服务器配置的默认模型" />
    <button id="think-btn" class="think-btn" title="开启思考模式">🧠 思考</button>
    <button id="search-btn" class="think-btn active" title="开关搜索（Tavily）">🔍 搜索</button>
    <select id="effort-select" class="effort-select" style="display:none">
      <option value="low">低</option>
      <option value="medium" selected>中</option>
      <option value="high">高</option>
    </select>
  </div>
  <span id="status-label">就绪</span>
</header>

<div id="messages">
  <div class="empty-hint" id="empty-hint">输入问题开始对话</div>
</div>

<input type="file" id="file-input" accept="image/*" multiple style="display:none" />
<div id="input-outer">
  <div id="img-preview-bar"></div>
  <div id="input-area">
    <button id="upload-btn" title="上传图片（也可直接粘贴）">🖼️</button>
    <textarea id="prompt" rows="1" placeholder="输入消息… （Enter 发送，Shift+Enter 换行，可直接粘贴图片）"></textarea>
    <button id="send-btn">发送</button>
  </div>
</div>

<script>
  const messagesEl   = document.getElementById('messages');
  const promptEl     = document.getElementById('prompt');
  const sendBtn      = document.getElementById('send-btn');
  const apiBaseEl    = document.getElementById('api-base');
  const statusLabel  = document.getElementById('status-label');
  const previewBar   = document.getElementById('img-preview-bar');
  const fileInput    = document.getElementById('file-input');
  const uploadBtn    = document.getElementById('upload-btn');
  const modelInput   = document.getElementById('model-input');
  const thinkBtn     = document.getElementById('think-btn');
  const effortSelect = document.getElementById('effort-select');
  const searchBtn    = document.getElementById('search-btn');

  let thinkingEnabled = false;
  let searchEnabled   = true;

  thinkBtn.addEventListener('click', () => {
    thinkingEnabled = !thinkingEnabled;
    thinkBtn.classList.toggle('active', thinkingEnabled);
    effortSelect.style.display = thinkingEnabled ? '' : 'none';
  });

  searchBtn.addEventListener('click', () => {
    searchEnabled = !searchEnabled;
    searchBtn.classList.toggle('active', searchEnabled);
    searchBtn.title = searchEnabled ? '关闭搜索（Tavily）' : '开启搜索（Tavily）';
  });

  // 待发送图片列表（base64 data URLs）
  let pendingImages = [];

  uploadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    [...fileInput.files].forEach(addImageFile);
    fileInput.value = '';
  });

  // 粘贴图片
  document.addEventListener('paste', e => {
    const items = [...(e.clipboardData?.items ?? [])];
    const imgItems = items.filter(i => i.type.startsWith('image/'));
    if (imgItems.length) {
      e.preventDefault();
      imgItems.forEach(item => addImageFile(item.getAsFile()));
    }
  });

  function addImageFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => addImageDataUrl(reader.result);
    reader.readAsDataURL(file);
  }

  function addImageDataUrl(dataUrl) {
    pendingImages.push(dataUrl);
    const thumb = document.createElement('div');
    thumb.className = 'img-thumb';
    const idx = pendingImages.length - 1;
    thumb.innerHTML = `<img src="${dataUrl}" /><button class="remove-btn" data-idx="${idx}">✕</button>`;
    thumb.querySelector('.remove-btn').addEventListener('click', () => {
      pendingImages.splice(idx, 1);
      thumb.remove();
    });
    previewBar.appendChild(thumb);
  }

  promptEl.addEventListener('input', autosize);
  promptEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function autosize() {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 用户消息 ── */
  function appendUser(text, images) {
    document.getElementById('empty-hint')?.remove();
    const imagesHtml = images.length
      ? `<div class="msg-images">${images.map(u => `<img src="${u}" />`).join('')}</div>`
      : '';
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar user">你</div>
      <div class="msg-body">
        <div class="msg-name">你</div>
        ${imagesHtml}
        <div class="user-bubble">${esc(text)}</div>
      </div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  /* ── AI 消息骨架 ── */
  function createAiMsg() {
    document.getElementById('empty-hint')?.remove();
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.innerHTML = `
      <div class="avatar ai">🤖</div>
      <div class="msg-body">
        <div class="msg-name">AI</div>
      </div>`;
    messagesEl.appendChild(row);
    const body = row.querySelector('.msg-body');

    // 模型思考块（懒创建）
    let modelThinkBlock = null, modelThinkContent = null, modelThinkToggle = null;

    function ensureModelThinkBlock() {
      if (modelThinkBlock) return;
      modelThinkBlock = document.createElement('div');
      modelThinkBlock.className = 'model-think-block';
      modelThinkToggle = document.createElement('div');
      modelThinkToggle.className = 'model-think-toggle open';
      modelThinkToggle.innerHTML = `<span>🧠</span><span class="mt-label">模型思考中…</span><span class="mt-chevron">▼</span>`;
      modelThinkContent = document.createElement('div');
      modelThinkContent.className = 'model-think-content visible';
      modelThinkBlock.appendChild(modelThinkToggle);
      modelThinkBlock.appendChild(modelThinkContent);
      body.appendChild(modelThinkBlock);
      modelThinkToggle.addEventListener('click', () => {
        const open = modelThinkContent.classList.toggle('visible');
        modelThinkToggle.classList.toggle('open', open);
      });
    }

    // 工具步骤块（懒创建）
    let thinkBlock = null, stepsEl = null, toggleEl = null;
    const toolCards = {};

    function ensureThinkBlock() {
      if (thinkBlock) return;
      thinkBlock = document.createElement('div');
      thinkBlock.className = 'think-block';
      toggleEl = document.createElement('div');
      toggleEl.className = 'think-toggle open';
      toggleEl.innerHTML = `<span class="think-icon">⚙️</span><span class="think-label">深度思考中…</span><span class="chevron">▼</span>`;
      stepsEl = document.createElement('div');
      stepsEl.className = 'think-steps visible';
      thinkBlock.appendChild(toggleEl);
      thinkBlock.appendChild(stepsEl);
      body.appendChild(thinkBlock);
      toggleEl.addEventListener('click', () => {
        const open = stepsEl.classList.toggle('visible');
        toggleEl.classList.toggle('open', open);
      });
    }

    // 文本节点（懒创建）
    let textEl = null;
    function ensureText() {
      if (textEl) return;
      textEl = document.createElement('div');
      textEl.className = 'ai-text streaming';
      body.appendChild(textEl);
    }

    return {
      addToolStart(id, name, args) {
        ensureThinkBlock();
        const argsStr = JSON.stringify(args);
        const step = document.createElement('div');
        step.className = 'step';
        step.innerHTML = `
          <span class="step-icon">🔧</span>
          <div class="step-content">
            <div class="step-title">
              <span>${esc(name)}</span>
              <span class="step-badge">${esc(argsStr.length > 60 ? argsStr.slice(0,60)+'…' : argsStr)}</span>
              <span class="step-status"><span class="spin"></span></span>
            </div>
          </div>`;
        stepsEl.appendChild(step);
        toolCards[id] = step;
        scrollBottom();
      },

      addToolEnd(id, result) {
        const step = toolCards[id];
        if (!step) return;
        step.querySelector('.spin').outerHTML = '✅';
        const content = step.querySelector('.step-content');
        const trimmed = result.trim();
        const isTooLong = trimmed.length > 200;
        const resultEl = document.createElement('div');
        resultEl.className = 'step-result' + (isTooLong ? ' expandable' : '');
        resultEl.textContent = trimmed;
        if (isTooLong) {
          resultEl.addEventListener('click', () => resultEl.classList.toggle('expanded'));
        }
        content.appendChild(resultEl);
        scrollBottom();
      },

      appendToken(text) {
        ensureText();
        textEl.textContent += text;
        scrollBottom();
      },

      appendThinking(text) {
        ensureModelThinkBlock();
        modelThinkContent.textContent += text;
        scrollBottom();
      },

      finish() {
        if (textEl) textEl.classList.remove('streaming');
        if (modelThinkToggle) {
          modelThinkToggle.querySelector('.mt-label').textContent = '模型思考';
          modelThinkToggle.classList.remove('open');
          modelThinkContent?.classList.remove('visible');
        }
        if (toggleEl) {
          toggleEl.querySelector('.think-label').textContent = '深度思考';
          toggleEl.classList.remove('open');
          stepsEl?.classList.remove('visible');
        }
      },

      showError(msg) {
        ensureText();
        textEl.className = 'error-text';
        textEl.textContent = '⚠️ ' + msg;
      },
    };
  }

  /* ── 主发送逻辑 ── */
  async function send() {
    const input = promptEl.value.trim();
    if (!input || sendBtn.disabled) return;

    promptEl.value = '';
    autosize();
    sendBtn.disabled = true;
    statusLabel.textContent = '生成中…';

    const sentImages = [...pendingImages];
    pendingImages = [];
    previewBar.innerHTML = '';

    appendUser(input, sentImages);
    const ai = createAiMsg();

    try {
      const resp = await fetch(
        `${apiBaseEl.value.replace(/\/$/, '')}/api/ai/create`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            input,
            images: sentImages,
            ...(modelInput.value.trim() && { model: modelInput.value.trim() }),
            thinking: thinkingEnabled,
            ...(thinkingEnabled && { reasoningEffort: effortSelect.value }),
            search: searchEnabled,
          }),
        }
      );
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (!raw) continue;
          let evt;
          try { evt = JSON.parse(raw); } catch { continue; }

          switch (evt.type) {
            case 'token':      ai.appendToken(evt.content);                 break;
            case 'thinking':   ai.appendThinking(evt.content);              break;
            case 'tool_start': ai.addToolStart(evt.id, evt.name, evt.args); break;
            case 'tool_end':   ai.addToolEnd(evt.id, evt.result);           break;
            case 'done':       break;
            case 'error':      ai.showError(evt.message);                   break;
          }
        }
      }
    } catch (err) {
      ai.showError('连接失败：' + err.message);
    } finally {
      ai.finish();
      sendBtn.disabled = false;
      statusLabel.textContent = '就绪';
      scrollBottom();
    }
  }
</script>
</body>
</html>
