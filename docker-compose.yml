services:
  cloud-task:
    build: .
    image: cloud-task:latest
    container_name: cloud-task
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # ---- 数据库 ----
      # Postgres 模式（默认）
      # DATABASE_URL: "postgresql://user:password@host.neon.tech/neondb?sslmode=require"
      # SQLite 模式（注释掉 DATABASE_URL 并取消下面两行注释）
      TASK_QUEUE_DRIVER: sqlite
      SQLITE_DB_PATH: /app/data/store/app.db
      # ---- 日志 ----
      LOG_ENABLE_FILE: "true"
      LOG_DIR: /app/logs
      # LOG_LEVEL: info
      # ---- Worker ----
      # ENABLE_WORKER: "true"
      # WORKER_CONCURRENCY: "3"
      # TASK_MAX_ATTEMPTS: "3"
    volumes:
      # public/：前端文件内嵌在镜像里（由 Dockerfile 多阶段构建复制），重新部署只需 docker compose up -d --build
      # data/：绑定挂载，持久化 SQLite 数据库及其他运行时数据
      - ./data:/app/data
      # logs/：绑定挂载，日志文件直接写到宿主机目录
      - ./logs:/app/logs
