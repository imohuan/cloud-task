# 使用 GHCR 预构建镜像部署（无需本地 build）
#
# 首次启动前（与 compose 同目录）：
#   cp .env.example .env   # 编辑 .env
#   mkdir -p data/store logs workspace data/.langgraph_api
#   chown -R 1001:1001 data logs workspace
#
# 启动：docker compose -f docker-compose.ghcr.yml up -d
#
# 自动更新在本机完成：watchtower 轮询 GHCR 的 latest，不依赖 GitHub CI SSH。
# 每台跑 Docker 的机器各自 up 一份；只重建带 watchtower.enable 标签的容器。
# 关闭 watchtower：docker compose -f docker-compose.ghcr.yml up -d cloud-task
services:
  cloud-task:
    image: ghcr.io/imohuan/cloud-task:latest
    container_name: cloud-task
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      TASK_QUEUE_DRIVER: sqlite
      SQLITE_DB_PATH: /app/data/store/app.db
      LOG_ENABLE_FILE: "true"
      LOG_DIR: /app/logs
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      APP_LOGIN_PASSWORD: ${APP_LOGIN_PASSWORD}
      APP_LOGIN_TTL_MS: ${APP_LOGIN_TTL_MS}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    volumes:
      - ./data:/app/data
      - ./data/.langgraph_api:/agent/.langgraph_api
      - ./logs:/app/logs
      - ./workspace:/agent/workspace

  # 镜像更新后自动 pull + 重建带 watchtower 标签的容器（见 README「自动更新」）
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: cloud-task-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
    # 私有 GHCR：取消注释并先在宿主机执行 docker login ghcr.io
    #   - ${DOCKER_CONFIG:-~/.docker}/config.json:/config.json:ro
